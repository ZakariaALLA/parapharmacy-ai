version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: parapharma-db
    environment:
      POSTGRES_DB: parapharma
      POSTGRES_USER: parapharma
      POSTGRES_PASSWORD: parapharma_secret_2024
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parapharma"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build: ./backend
    container_name: parapharma-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: parapharma
      DB_USER: parapharma
      DB_PASSWORD: parapharma_secret_2024
      JWT_SECRET: YourSuperSecretKeyForJWT2024ParaPharmaMaroc256BitKey!!
      JWT_EXPIRATION: 86400000
      UPLOAD_DIR: /uploads/images
    volumes:
      - uploads_data:/uploads/images
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./backend/src
        - action: rebuild
          path: ./backend/pom.xml

  # Angular Frontend + Nginx
  frontend:
    build: ./frontend
    container_name: parapharma-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./frontend/src

volumes:
  postgres_data:
  uploads_data:
